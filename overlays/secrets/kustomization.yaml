apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

secretGenerator:
  - name: api-secrets
    type: Opaque
    namespace: 5stack
    envs:
      - api-secrets.env

  - name: timescaledb-secrets
    type: Opaque
    namespace: 5stack
    envs:
      - timescaledb-secrets.env
  - name: tailscale-secrets
    type: Opaque
    namespace: 5stack
    envs:
      - tailscale-secrets.env
  - name: steam-secrets
    type: Opaque
    namespace: 5stack
    envs:
      - steam-secrets.env
  - name: hasura-secrets
    type: Opaque
    namespace: 5stack
    envs:
      - hasura-secrets.env
  - name: discord-secrets
    type: Opaque
    namespace: 5stack
    envs:
      - discord-secrets.env
  - name: s3-secrets
    type: Opaque
    namespace: 5stack
    envs:
      - s3-secrets.env
  - name: redis-secrets
    type: Opaque
    namespace: 5stack
    envs:
      - redis-secrets.env
  - name: typesense-secrets
    type: Opaque
    namespace: 5stack
    envs:
      - typesense-secrets.env
  - name: minio-secrets
    type: Opaque
    namespace: 5stack
    envs:
      - minio-secrets.env
  - name: faceit-secrets
    type: Opaque
    namespace: 5stack
    envs:
      - faceit-secrets.env

replacements:
  # API Deployment replacements
  - source:
      kind: Secret
      name: api-secrets
    targets:
    - select:
        kind: Deployment
        name: api
      fieldPaths:
      - spec.template.spec.containers.0.envFrom.1.secretRef.name
  - source:
      kind: Secret
      name: steam-secrets
    targets:
    - select:
        kind: Deployment
        name: api
      fieldPaths:
      - spec.template.spec.containers.0.envFrom.2.secretRef.name
  - source:
      kind: Secret
      name: hasura-secrets
    targets:
    - select:
        kind: Deployment
        name: api
      fieldPaths:
      - spec.template.spec.containers.0.envFrom.3.secretRef.name
  - source:
      kind: Secret
      name: typesense-secrets
    targets:
    - select:
        kind: Deployment
        name: api
      fieldPaths:
      - spec.template.spec.containers.0.envFrom.4.secretRef.name
  - source:
      kind: Secret
      name: discord-secrets
    targets:
    - select:
        kind: Deployment
        name: api
      fieldPaths:
      - spec.template.spec.containers.0.envFrom.5.secretRef.name
  - source:
      kind: Secret
      name: redis-secrets
    targets:
    - select:
        kind: Deployment
        name: api
      fieldPaths:
      - spec.template.spec.containers.0.envFrom.6.secretRef.name
  - source:
      kind: Secret
      name: timescaledb-secrets
    targets:
    - select:
        kind: Deployment
        name: api
      fieldPaths:
      - spec.template.spec.containers.0.envFrom.7.secretRef.name
  - source:
      kind: Secret
      name: tailscale-secrets
    targets:
    - select:
        kind: Deployment
        name: api
      fieldPaths:
      - spec.template.spec.containers.0.envFrom.8.secretRef.name
  - source:
      kind: Secret
      name: s3-secrets
    targets:
    - select:
        kind: Deployment
        name: api
      fieldPaths:
      - spec.template.spec.containers.0.envFrom.9.secretRef.name
  - source:
      kind: Secret
      name: faceit-secrets
    targets:
    - select:
        kind: Deployment
        name: api
      fieldPaths:
      - spec.template.spec.containers.0.envFrom.11.secretRef.name

  # Hasura Deployment replacements
  - source:
      kind: Secret
      name: hasura-secrets
    targets:
    - select:
        kind: Deployment
        name: hasura
      fieldPaths:
      - spec.template.spec.containers.0.envFrom.0.secretRef.name
      - spec.template.spec.initContainers.0.envFrom.3.secretRef.name
  - source:
      kind: Secret
      name: timescaledb-secrets
    targets:
    - select:
        kind: Deployment
        name: hasura
      fieldPaths:
      - spec.template.spec.containers.0.env.11.valueFrom.secretKeyRef.name
      - spec.template.spec.initContainers.0.envFrom.7.secretRef.name
      - spec.template.spec.volumes.1.secret.secretName
  - source:
      kind: Secret
      name: api-secrets
    targets:
    - select:
        kind: Deployment
        name: hasura
      fieldPaths:
      - spec.template.spec.initContainers.0.envFrom.1.secretRef.name
  - source:
      kind: Secret
      name: steam-secrets
    targets:
    - select:
        kind: Deployment
        name: hasura
      fieldPaths:
      - spec.template.spec.initContainers.0.envFrom.2.secretRef.name
  - source:
      kind: Secret
      name: typesense-secrets
    targets:
    - select:
        kind: Deployment
        name: hasura
      fieldPaths:
      - spec.template.spec.initContainers.0.envFrom.4.secretRef.name
  - source:
      kind: Secret
      name: discord-secrets
    targets:
    - select:
        kind: Deployment
        name: hasura
      fieldPaths:
      - spec.template.spec.initContainers.0.envFrom.5.secretRef.name
  - source:
      kind: Secret
      name: redis-secrets
    targets:
    - select:
        kind: Deployment
        name: hasura
      fieldPaths:
      - spec.template.spec.initContainers.0.envFrom.6.secretRef.name

  # Redis Deployment replacements
  - source:
      kind: Secret
      name: redis-secrets
    targets:
    - select:
        kind: Deployment
        name: redis
      fieldPaths:
      - spec.template.spec.containers.0.envFrom.0.secretRef.name

  # Minio StatefulSet replacements
  - source:
      kind: Secret
      name: minio-secrets
    targets:
    - select:
        kind: StatefulSet
        name: minio
      fieldPaths:
      - spec.template.spec.containers.0.envFrom.1.secretRef.name
  - source:
      kind: Secret
      name: s3-secrets
    targets:
    - select:
        kind: StatefulSet
        name: minio
      fieldPaths:
      - spec.template.spec.containers.0.envFrom.2.secretRef.name

  # TimescaleDB StatefulSet replacements
  - source:
      kind: Secret
      name: timescaledb-secrets
    targets:
    - select:
        kind: StatefulSet
        name: timescaledb
      fieldPaths:
      - spec.template.spec.containers.0.envFrom.0.secretRef.name
  - source:
      kind: Secret
      name: api-secrets
    targets:
    - select:
        kind: StatefulSet
        name: timescaledb
      fieldPaths:
      - spec.template.spec.containers.0.env.4.valueFrom.secretKeyRef.name
      - spec.template.spec.volumes.0.secret.secretName

  # Typesense StatefulSet replacements
  - source:
      kind: Secret
      name: typesense-secrets
    targets:
    - select:
        kind: StatefulSet
        name: typesense
      fieldPaths:
      - spec.template.spec.containers.0.envFrom.1.secretRef.name

  # Game Server Node Connector DaemonSet replacements
  - source:
      kind: Secret
      name: hasura-secrets
    targets:
    - select:
        kind: DaemonSet
        name: game-server-node-connector
      fieldPaths:
      - spec.template.spec.containers.0.envFrom.0.secretRef.name
  - source:
      kind: Secret
      name: redis-secrets
    targets:
    - select:
        kind: DaemonSet
        name: game-server-node-connector
      fieldPaths:
      - spec.template.spec.containers.0.envFrom.1.secretRef.name 