logLevel: info
logDestinations: [stdout]

api: yes
apiAddress: :9997

authInternalUsers:
  - user: any
    pass:
    ips: []
    permissions:
      - action: publish
      - action: read
      - action: playback
      - action: api
      - action: metrics
      - action: pprof

hls: yes
hlsAddress: :8888
hlsAllowOrigins: ["*"]
hlsVariant: lowLatency
hlsSegmentCount: 7
hlsSegmentDuration: 1s
hlsPartDuration: 200ms

webrtc: yes
webrtcAddress: :8889

webrtcAllowOrigins: ["*"]

srt: yes
srtAddress: :8890

rtmp: yes
rtmpAddress: :1935

pathDefaults:
  source: publisher
  sourceOnDemand: no

paths:
  all_others:
