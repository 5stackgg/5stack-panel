apiVersion: apps/v1
kind: DaemonSet
metadata:
  labels:
    app: game-server-node-connector-nvidia
  name: game-server-node-connector-nvidia
  namespace: 5stack
spec:
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  selector:
    matchLabels:
      app: game-server-node-connector-nvidia
  template:
    metadata:
      labels:
        app: game-server-node-connector-nvidia
    spec:
      dnsConfig:
        options:
          - name: ndots
            value: "1"
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      serviceAccountName: game-server-node-connector
      runtimeClassName: nvidia
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: nvidia-gpu
                    operator: In
                    values: ["true"]
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      containers:
        - image: ghcr.io/5stackgg/game-server-node-connector:latest
          name: game-server-node-connector
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "4Gi"
          securityContext:
            privileged: true
          startupProbe:
            httpGet:
              path: /system/healthz
              port: 8585
            periodSeconds: 5
            failureThreshold: 12
          readinessProbe:
            httpGet:
              path: /system/healthz
              port: 8585
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
            successThreshold: 2
          livenessProbe:
            httpGet:
              path: /system/healthz
              port: 8585
            initialDelaySeconds: 15
            periodSeconds: 15
            failureThreshold: 3
          ports:
            - containerPort: 8585
              name: http
              protocol: TCP
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: NVIDIA_VISIBLE_DEVICES
              value: "all"
            - name: NVIDIA_DRIVER_CAPABILITIES
              value: "utility"
          envFrom:
            - secretRef:
                name: hasura-secrets
            - secretRef:
                name: redis-secrets
          volumeMounts:
            - name: server-files
              mountPath: /serverfiles
            - name: csgo-server-files
              mountPath: /serverfiles-csgo
            - name: demos
              mountPath: /demos
            - name: dedicated-servers
              mountPath: /servers
            - name: custom-plugins
              mountPath: /custom-plugins
            - name: manifests
              mountPath: /pod-manifests
            - name: containerd-sock
              mountPath: /containerd.sock
              readOnly: true
            - name: cpu-sys
              mountPath: /host-cpu
              readOnly: true
      volumes:
        - name: server-files
          hostPath:
            path: /opt/5stack/serverfiles
            type: DirectoryOrCreate
        - name: csgo-server-files
          hostPath:
            path: /opt/5stack/serverfiles-csgo
            type: DirectoryOrCreate
        - name: demos
          hostPath:
            path: /opt/5stack/demos
            type: DirectoryOrCreate
        - name: dedicated-servers
          hostPath:
            path: /opt/5stack/servers
            type: DirectoryOrCreate
        - name: custom-plugins
          hostPath:
            path: /opt/5stack/custom-plugins
            type: DirectoryOrCreate
        - name: manifests
          hostPath:
            path: /var/lib/rancher/k3s/agent/pod-manifests
            type: Directory
        - name: containerd-sock
          hostPath:
            path: /run/k3s/containerd/containerd.sock
        - name: cpu-sys
          hostPath:
            path: /sys/devices/system/cpu/
