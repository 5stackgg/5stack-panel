apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: 5stack

# MediaMTX is bundled here so opting in to the dev streamer also brings up
# its publish target — the streamer can't do anything useful without it.
resources:
  - deployment.yaml
  - ../../mediamtx

configMapGenerator:
  - name: dev-game-streamer-config
    envs:
      - dev-game-streamer-config.env
