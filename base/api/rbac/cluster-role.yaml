apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: server-creator-clusterrole
rules:
  # Nodes are cluster-scoped — patch needed for game server node labeling
  - apiGroups:
      - ''
    resources:
      - nodes
    verbs:
      - get
      - list
      - patch
  # PVs are cluster-scoped — read-only for monitoring storage
  - apiGroups:
      - ''
    resources:
      - persistentvolumes
    verbs:
      - get
      - list
      - watch
