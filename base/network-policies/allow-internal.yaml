# TimescaleDB: allow from hasura and api only
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-timescaledb-ingress
  namespace: 5stack
spec:
  podSelector:
    matchLabels:
      app: timescaledb
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: hasura
        - podSelector:
            matchLabels:
              app: api
      ports:
        - port: 5432
          protocol: TCP
  policyTypes:
    - Ingress
---
# Redis: allow from api and game-server-node-connector
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-redis-ingress
  namespace: 5stack
spec:
  podSelector:
    matchLabels:
      app: redis
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: api
        - podSelector:
            matchLabels:
              app: game-server-node-connector
      ports:
        - port: 6379
          protocol: TCP
  policyTypes:
    - Ingress
---
# Hasura: allow from web, api, and ingress
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-hasura-ingress
  namespace: 5stack
spec:
  podSelector:
    matchLabels:
      app: hasura
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: api
        - podSelector:
            matchLabels:
              app: web
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - port: 8080
          protocol: TCP
  policyTypes:
    - Ingress
---
# API: allow from ingress and game-server-node-connector
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-api-ingress
  namespace: 5stack
spec:
  podSelector:
    matchLabels:
      app: api
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
        - podSelector:
            matchLabels:
              app: game-server-node-connector
      ports:
        - port: 5585
          protocol: TCP
  policyTypes:
    - Ingress
---
# Game server node connector: allow from api (Redis transport)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-connector-ingress
  namespace: 5stack
spec:
  podSelector:
    matchLabels:
      app: game-server-node-connector
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: api
      ports:
        - port: 8585
          protocol: TCP
  policyTypes:
    - Ingress
